<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12161c"/>
      <stop offset="1" stop-color="#07080b"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2fd18a"/>
      <stop offset="1" stop-color="#57f5b0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="24" fill="url(#bg)"/>
  <rect x="2.75" y="2.75" width="94.5" height="94.5" rx="23.25" fill="none" stroke="#2a2f38" stroke-width="1.5"/>
  <!-- rising arc: Arc network + launch trajectory + the "A" of A NEW ONE -->
  <path d="M21 76 C34 67 43 44 72 27" fill="none" stroke="url(#mint)" stroke-width="12"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- the coin at the top of the arc -->
  <circle cx="74" cy="26" r="12" fill="url(#mint)" filter="url(#glow)"/>
  <text x="74" y="31" font-family="Arial, sans-serif" font-size="15" font-weight="800"
        fill="#07130d" text-anchor="middle">$</text>
</svg>
